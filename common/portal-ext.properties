include-and-override=portal-developer.properties

cache.filter.include.user.agent=false
com.liferay.portal.servlet.filters.cache.CacheFilter=false
session.timeout=120

company.login.prepopulate.domain=false
company.security.auto.login=false
company.security.strangers=false

layout.user.private.layouts.enabled=false
layout.user.private.layouts.auto.create=false
layout.user.public.layouts.enabled=false
layout.user.public.layouts.auto.create=false

field.enable.com.liferay.portal.kernel.model.Contact.male=false
field.enable.com.liferay.portal.kernel.model.Contact.birthday=false

session.timeout.auto.extend=true
session.timeout.auto.extend.offset=10

feature.flag.ui.visible[dev]=true

#Modern Image Formats
dl.file.entry.preview.image.mime.types=image/bmp,\
image/gif,\
image/jpeg,\
image/pjpeg,\
image/png,\
image/tiff,\
image/x-citrix-jpeg,\
image/x-citrix-png,\
image/x-ms-bmp,\
image/x-png,\
image/x-tiff,\
image/webp,\
image/avif
