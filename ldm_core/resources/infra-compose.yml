services:
  traefik:
    image: traefik:v3.6.1
    container_name: liferay-proxy-global
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.directory=/etc/traefik/certs"
      - "--providers.file.watch=true"
    ports:
      - "${LDM_HTTP_PORT:-80}:80"
      - "${LDM_SSL_PORT:-443}:443"
      - "${LDM_ADMIN_PORT:-18080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${LDM_CERTS_DIR}:/etc/traefik/certs:ro
    networks:
      - liferay-net

networks:
  liferay-net:
    external: true
