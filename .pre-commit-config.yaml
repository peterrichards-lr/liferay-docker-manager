repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        stages: [pre-push, manual]
        additional_dependencies:
          - types-requests
          - types-PyYAML
        args: [--config-file=mypy.ini]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        language: system
        entry: shellcheck
        files: \.sh$

  - repo: local
    hooks:
      - id: pytest
        stages: [pre-push, manual]
        name: pytest
        entry: scripts/run_python.sh -m pytest
        language: system
        pass_filenames: false
        always_run: true

      - id: bandit
        stages: [pre-push, manual]
        name: bandit
        entry: scripts/run_python.sh -m bandit
        args: [ "-r", "ldm_core/", "-x", "ldm_core/tests/", "--severity-level", "medium" ]
        language: system
        pass_filenames: false
        always_run: true

      - id: check-version-sync
        name: Check Version Synchronization
        entry: scripts/run_python.sh scripts/check_version_sync.py
        language: system
        files: ^pyproject\.toml$|^ldm_core/constants\.py$
        pass_filenames: false

      - id: check-cli-drift
        name: Check CLI Documentation Drift
        entry: scripts/run_python.sh scripts/check_cli_drift.py
        language: system
        files: ^ldm_core/cli\.py$|^docs/reference/cli/core\.md$|^docs/reference/advanced_cli\.md$
        pass_filenames: false
        always_run: true

      - id: sync-docs
        name: Sync Documentation
        entry: bash -c 'scripts/run_python.sh scripts/sync_docs.py && git diff --exit-code docs/*.md'
        language: system
        files: ^ldm_core/|^scripts/sync_docs\.py$|^docs/
        pass_filenames: false
        always_run: true

      - id: bump-docs-timestamps
        name: Bump Documentation Timestamps
        entry: scripts/run_python.sh scripts/append_timestamps.py
        language: system
        files: \.md$
        pass_filenames: true

      - id: check-docs-review
        name: Check Documentation Review Status
        entry: scripts/run_python.sh scripts/check_docs_review.py --max-review-days 180 --max-gap-days 180
        language: system
        files: \.md$
        pass_filenames: false
        always_run: true

      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        entry: bash -c 'if command -v pwsh &>/dev/null; then pwsh -NoProfile -NonInteractive -Command "if (Get-Module -ListAvailable PSScriptAnalyzer) { Invoke-ScriptAnalyzer -Path . -Recurse | Where-Object { \$_.Severity -eq \"Error\" } | ForEach-Object { Write-Error \$_.Message }; if (\$error) { exit 1 } } else { Write-Host \"PSScriptAnalyzer not found, skipping.\" }"; else exit 0; fi'
        language: system
        files: \.ps1$|\.psm1$
        pass_filenames: false

      - id: validate-compose
        name: Validate Docker Compose Templates
        entry: scripts/run_python.sh scripts/validate_compose.py
        language: system
        files: ^ldm_core/resources/infra-compose\.yml$|^scripts/validate_compose\.py$
        pass_filenames: false


  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/Mateusz-Grzelinski/actionlint-py
    rev: v1.7.12.24
    hooks:
      - id: actionlint

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.16.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: deptry
        stages: [pre-push, manual]
        name: deptry
        entry: scripts/run_python.sh -m deptry .
        language: system
        pass_filenames: false
        always_run: true
