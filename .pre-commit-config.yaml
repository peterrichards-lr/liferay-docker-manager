repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-PyYAML
        args: [--config-file=mypy.ini]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        exclude: ^ldm$

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python3 -m pytest
        language: system
        pass_filenames: false
        always_run: true

      - id: bandit
        name: bandit
        entry: python3 -m bandit
        args: [ "-r", "ldm_core/", "-x", "ldm_core/tests/", "--severity-level", "medium" ]
        language: system
        pass_filenames: false
        always_run: true

      - id: check-version-sync
        name: Check Version Synchronization
        entry: python3 scripts/check_version_sync.py
        language: system
        files: ^pyproject\.toml$|^ldm_core/constants\.py$
        pass_filenames: false

      - id: sync-docs
        name: Sync Documentation
        entry: bash -c 'python3 scripts/sync_docs.py && git diff --exit-code docs/*.md'
        language: system
        files: ^ldm_core/|^scripts/sync_docs\.py$|^docs/
        pass_filenames: false
        always_run: true

      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        entry: bash -c 'if command -v pwsh &>/dev/null; then pwsh -NoProfile -NonInteractive -Command "if (Get-Module -ListAvailable PSScriptAnalyzer) { Invoke-ScriptAnalyzer -Path . -Recurse | Where-Object { \$_.Severity -eq \"Error\" } | ForEach-Object { Write-Error \$_.Message }; if (\$error) { exit 1 } } else { Write-Host \"PSScriptAnalyzer not found, skipping.\" }"; else exit 0; fi'
        language: system
        files: \.ps1$|\.psm1$
        pass_filenames: false

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.16.0
    hooks:
      - id: markdownlint-cli2
