repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: ./.venv/bin/pytest
        language: system
        pass_filenames: false
        always_run: true

      - id: bandit
        name: bandit
        entry: ./.venv/bin/bandit
        args: [ "-r", "ldm_core/", "-x", "ldm_core/tests/", "--severity-level", "medium" ]
        language: system
        pass_filenames: false
        always_run: true

      - id: check-version-sync
        name: Check Version Synchronization
        entry: python3 scripts/check_version_sync.py
        language: system
        files: ^pyproject\.toml$|^ldm_core/constants\.py$
        pass_filenames: false

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        exclude: ^ldm$

      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        entry: bash -c 'if command -v pwsh &>/dev/null; then pwsh -NoProfile -NonInteractive -Command "if (Get-Module -ListAvailable PSScriptAnalyzer) { Invoke-ScriptAnalyzer -Path . -Recurse | Where-Object { \$_.Severity -eq \"Error\" } | ForEach-Object { Write-Error \$_.Message }; if (\$error) { exit 1 } } else { Write-Host \"PSScriptAnalyzer not found, skipping.\" }"; else exit 0; fi'
        language: system
        files: \.ps1$|\.psm1$
        pass_filenames: false

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.16.0
    hooks:
      - id: markdownlint-cli2
