version: "3.8"
services:
  liferay:
    image: "liferay/dxp:2026.q1.4-lts"
    ports:
      - "8080:8080"
    environment:
      - "LIFERAY_JVM_OPTS=-Xms2048m -Xmx5120m -XX:MaxMetaspaceSize=768m -XX:MetaspaceSize=768m -XX:NewSize=1689m -XX:MaxNewSize=1689m -Dfile.encoding=UTF8 -Duser.timezone=GMT --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.text=ALL-UNNAMED --add-opens=java.base/java.time=ALL-UNNAMED --add-opens=java.base/sun.net.www.protocol.http=ALL-UNNAMED --add-opens=java.base/sun.net.www.protocol.https=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.security.ssl=ALL-UNNAMED --add-opens=java.base/sun.security.util=ALL-UNNAMED --add-opens=java.base/sun.security.x509=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.sasl/conf=ALL-UNNAMED --add-opens=java.management/sun.management=ALL-UNNAMED --add-opens=jdk.management/com.sun.management.internal=ALL-UNNAMED -XX:TieredStopAtLevel=1"
      - "LIFERAY_HOME=/opt/liferay"
      - "LIFERAY_JDBC_DEFAULT_DRIVER_CLASS_NAME=org.mariadb.jdbc.Driver"
      - "LIFERAY_JDBC_DEFAULT_URL=jdbc:mariadb://db:3306/lportal?characterEncoding=UTF-8&dontTrackOpenResources=true&holdResultsOpenOverStatementClose=true&serverTimezone=GMT&useFastDateParsing=false&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true"
      - "LIFERAY_JDBC_DEFAULT_USERNAME=lportal"
      - "LIFERAY_JDBC_DEFAULT_PASSWORD=test"
    volumes:
      - "/Volumes/SanDisk/repos/liferay-docker-manager/seeded-2026_q1_4-lts-mysql/deploy:/mnt/liferay/deploy"
      - "/Volumes/SanDisk/repos/liferay-docker-manager/seeded-2026_q1_4-lts-mysql/files:/mnt/liferay/files"
      - "/Volumes/SanDisk/repos/liferay-docker-manager/seeded-2026_q1_4-lts-mysql/data:/storage/liferay/data"
      - "/Volumes/SanDisk/repos/liferay-docker-manager/seeded-2026_q1_4-lts-mysql/logs:/opt/liferay/logs"
      - "/Volumes/SanDisk/repos/liferay-docker-manager/seeded-2026_q1_4-lts-mysql/osgi/state:/opt/liferay/osgi/state"
    networks:
      - "liferay-net"
    container_name: "seeded-2026_q1_4-lts-mysql"
    depends_on:
      db:
        condition: "service_healthy"
  db:
    image: "mysql:8.0"
    command:
      - "mysqld"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--character-set-filesystem=utf8mb4"
      - "--lower_case_table_names=1"
      - "--default-authentication-plugin=mysql_native_password"
      - "--bind-address=0.0.0.0"
    environment:
      MYSQL_ROOT_PASSWORD: "test"
      MYSQL_USER: "lportal"
      MYSQL_PASSWORD: "test"
      MYSQL_DATABASE: "lportal"
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "localhost"
        - "-uroot"
        - "-ptest"
      interval: "10s"
      timeout: "5s"
      retries: 10
      start_period: "30s"
    networks:
      - "liferay-net"
networks:
  liferay-net:
    external: true