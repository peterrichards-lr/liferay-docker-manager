name: Feature Request
description: Suggest an idea or enhancement for LDM
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to share your idea! We love community feedback.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: I would like a command that...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Currently, I am doing this manually by...
    validations:
      required: false
  - type: textarea
    id: business_impact
    attributes:
      label: Business or Proof-of-Concept (POC) Impact
      description: Please describe the business case, POC urgency, or productivity impact of this feature to help us measure value.
      placeholder: e.g., This feature is required for the UK GTM demonstration on July 10...
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ### 👍 Community Voting & Prioritization
        Please ask your team/colleagues to upvote this issue using GitHub's native 👍 reaction.
        Our automated prioritization engine runs daily and updates issue tracking labels:
        - **priority: p1**: 10+ upvotes
        - **priority: p2**: 5-9 upvotes
        - **priority: p3**: Less than 5 upvotes
