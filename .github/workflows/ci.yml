name: LDM CI & Release

on:
  push:
    branches: ["master"]
    tags: ["v*"] # Trigger on tags like v1.0.0
  pull_request:
    branches: ["master"]

permissions:
  contents: write # Needed for creating releases

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest bandit pip-audit

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Security Scan (Bandit)
        run: |
          # Scan for common security issues in Python code.
          # We only fail on Medium/High severity to allow necessary subprocess patterns.
          bandit -r ldm_core/ -x ldm_core/tests/ --severity-level medium

      - name: Dependency Audit (pip-audit)
        run: |
          # Ignoring CVE-2026-4539 (pygments) as it is currently unpatched and doesn't affect LDM.
          pip-audit --ignore-vuln CVE-2026-4539

      - name: Lint Shell scripts (ShellCheck)
        run: |
          sudo apt-get install -y shellcheck
          find . -name "*.sh" -not -path "*/.*" | xargs shellcheck

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

      - name: Documentation Sync
        shell: bash
        run: |
          pip install -e .
          python3 scripts/sync_docs.py
          # Fail CI if sync script made changes - this ensures docs were synced BEFORE commit
          git diff --exit-code docs/*.md

      - name: Run unit tests
        shell: bash
        run: |
          pip install -e .
          pytest

  smoke-test:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install mkcert
        run: |
          # Install mkcert for SSL smoke tests
          sudo apt-get update
          sudo apt-get install -y libnss3-tools
          curl -L https://github.com/FiloSottile/mkcert/releases/download/v1.4.4/mkcert-v1.4.4-linux-amd64 -o mkcert
          chmod +x mkcert
          sudo mv mkcert /usr/local/bin/
          mkcert -install

      - name: LDM Doctor Smoke Test
        shell: bash
        run: |
          # Run doctor in non-interactive mode
          export DOCKER_API_VERSION=1.44
          pip install -e .
          # Test --skip-project and non-zero exit code (should be 0 or 1 depending on Docker state)
          # In CI, Docker might not be fully functional, so we tolerate exit 1
          python3 liferay_docker.py doctor --skip-project || [ $? -eq 1 ]

      - name: LDM Repair Smoke Test (Mock)
        shell: bash
        run: |
          pip install -e .
          # Mock a repair attempt (aborted via input or URL check)
          # We just verify it parses arguments and reaches preparation
          python3 liferay_docker.py upgrade --repair <<< "N" || true

      - name: LDM Run Smoke Test (Mock)
        shell: bash
        run: |
          # Create a mock project
          mkdir -p smoke-project/files
          touch smoke-project/files/portal-ext.properties
          # Using an older version format to avoid triggering global search logic in CI
          echo "tag=7.4.13-u100" > smoke-project/.liferay-docker.meta
          echo "container_name=smoke-test" >> smoke-project/.liferay-docker.meta
          echo "image_tag=alpine" >> smoke-project/.liferay-docker.meta

          # Run LDM to generate compose
          pip install -e .
          python3 liferay_docker.py -y run smoke-project --no-up --sidecar --no-wait

          # Override healthcheck in generated compose to avoid timeout since we use alpine
          # Use python to safely manipulate the YAML if possible, or simple sed
          sed -i 's/curl -f http:\/\/localhost:8080\/c\/portal\/layout/true/g' smoke-project/docker-compose.yml

          # Now run without --no-up to verify it starts and exits quickly
          python3 liferay_docker.py -y run smoke-project --no-wait
  build:
    needs: [lint-and-test, smoke-test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests (Cross-Platform)
        shell: bash
        run: |
          pip install -e .
          pytest ldm_core/tests/

      - name: LDM Maintenance Smoke Test
        shell: bash
        run: |
          pip install -e .
          # Verify clear-cache (Non-Docker)
          python3 liferay_docker.py -y clear-cache
          # Skip prune in CI as it requires a running Docker daemon
          echo "ℹ Skipping Docker-dependent prune test in CI environment"

      - name: Build Standalone (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          pip install shiv
          pip install .
          
          # Inject build metadata if it's a tag release
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            sed -i "s/BUILD_INFO = None/BUILD_INFO = \"Release $TAG_NAME\"/g" ldm_core/constants.py
          fi

          OUTNAME="ldm-linux"
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            OUTNAME="ldm-macos"
          fi
          shiv -e ldm_core.cli:main -o $OUTNAME -p '/usr/bin/env python3' .
          chmod +x $OUTNAME
          echo "BINARY_PATH=$OUTNAME" >> $GITHUB_ENV

      - name: Build Standalone (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          pip install pyinstaller -r requirements.txt
          
          # Inject build metadata if it's a tag release
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            sed -i "s/BUILD_INFO = None/BUILD_INFO = \"Release $TAG_NAME\"/g" ldm_core/constants.py
          fi

          # Bundling the resources directory into the Windows binary
          pyinstaller --onefile --name ldm-windows --add-data "ldm_core/resources;ldm_core/resources" liferay_docker.py
          echo "BINARY_PATH=dist/ldm-windows.exe" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ldm-binary-${{ matrix.os }}
          path: ${{ env.BINARY_PATH }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin-temp
          merge-multiple: true

      - name: Prepare Samples and License
        run: |
          (cd references && zip -r ../samples.zip samples/)
          cp LICENSE bin-temp/
          mv samples.zip bin-temp/

      - name: Generate Checksums
        shell: bash
        run: |
          cd bin-temp
          sha256sum ldm-linux ldm-macos ldm-windows.exe samples.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin-temp/ldm-linux
            bin-temp/ldm-macos
            bin-temp/ldm-windows.exe
            bin-temp/samples.zip
            bin-temp/checksums.txt
            bin-temp/LICENSE
          make_latest: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Liferay Docker Manager (LDM) ${{ github.ref_name }} - Hardened Edition

            This release continues our commitment to environmental hardening for macOS, Windows, and Linux.

            ### 🚀 Installation (Direct Binary)

            **macOS (Intel/Silicon):**
            ```bash
            sudo curl -L https://github.com/peterrichards-lr/liferay-docker-manager/releases/latest/download/ldm-macos -o /usr/local/bin/ldm
            sudo chmod +x /usr/local/bin/ldm
            ```

            **Linux / WSL2:**
            ```bash
            sudo curl -L https://github.com/peterrichards-lr/liferay-docker-manager/releases/latest/download/ldm-linux -o /usr/local/bin/ldm
            sudo chmod +x /usr/local/bin/ldm
            ```

            **Windows (PowerShell):**
            ```powershell
            New-Item -ItemType Directory -Force -Path "$HOME\bin"
            Invoke-WebRequest -Uri "https://github.com/peterrichards-lr/liferay-docker-manager/releases/latest/download/ldm-windows.exe" -OutFile "$HOME\bin\ldm.exe"
            ```

            ### 🛠 Standard Hardening Features
            - **Hardened Monitoring**: Native Polling on macOS to prevent descriptor crashes.
            - **Wildcard SSL**: Automatic generation and Traefik matching for `*.local` and custom domains.
            - **Self-Healing Baseline**: Restore developer defaults via `ldm init-common`.
            - **Infrastructure Management**: Control global proxy state via `ldm infra-setup`.
            - **Architecture-Aware**: Automatic detection of OS for updates and checksums.
          draft: false
          prerelease: false
