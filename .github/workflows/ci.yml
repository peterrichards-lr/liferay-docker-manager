name: LDM CI & Release

on:
  push:
    branches: ["master"]
    tags: ["v*"] # Trigger on tags like v1.0.0
  pull_request:
    branches: ["master"]
  workflow_dispatch: # Allow manual triggers

# LDM-385: Prevent simultaneous release updates for the same tag/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Skip check if not a tag push
        id: check_trigger
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Code
        if: steps.check_trigger.outputs.is_tag == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate Tag and Branch Alignment
        if: steps.check_trigger.outputs.is_tag == 'true'
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == *"-"* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          
          git fetch origin master
          if git branch -r --contains ${{ github.sha }} | grep -E 'origin/master$' >/dev/null; then
            ON_MASTER=true
          else
            ON_MASTER=false
          fi
          
          echo "Tag: $TAG_NAME"
          echo "Is Pre-release: $IS_PRERELEASE"
          echo "Is on master: $ON_MASTER"
          
          if [ "$IS_PRERELEASE" = "true" ] && [ "$ON_MASTER" = "true" ]; then
            echo "::error::Pre-release tags (containing '-') cannot be pushed on master branch!"
            exit 1
          elif [ "$IS_PRERELEASE" = "false" ] && [ "$ON_MASTER" = "false" ]; then
            echo "::error::Stable release tags (no '-') must only be pushed on master branch!"
            exit 1
          fi
          echo "Tag validation successful!"

  pr-sprawl-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify PR Size Guardrail (Scope Sprawl Check)
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if echo "$PR_TITLE $PR_BODY" | grep -qi -E '\[bypass[ -]sprawl\]|\[bypass[ -]limit\]'; then
            echo "Scope sprawl check bypassed via keyword."
            exit 0
          fi
          
          IS_BUGFIX=false
          if [[ "$BRANCH_NAME" =~ ^(fix|bugfix)/ ]] || [[ "$PR_TITLE" =~ ^(fix|bugfix|bug): ]]; then
            IS_BUGFIX=true
          fi
          
          if [ "$IS_BUGFIX" = "true" ]; then
            git fetch origin master
            CHANGED_FILES_COUNT=$(git diff --name-only origin/master... | wc -l)
            echo "Changed files: $CHANGED_FILES_COUNT"
            if [ "$CHANGED_FILES_COUNT" -gt 10 ]; then
              echo "::error::Scope Sprawl Gate: Bugfix PR modifies $CHANGED_FILES_COUNT files (limit is 10). Please break down changes or include '[bypass sprawl]' in the PR title/description."
              exit 1
            fi
          fi


  lint-and-test:
    needs: validate-tag
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.check_code.outputs.code_changed }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Determine if Python checks are needed
        id: check_code
        shell: bash
        run: |
          CODE_CHANGED="true"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            CODE_CHANGED="false"
            for file in $CHANGED_FILES; do
              # If any file is NOT a markdown file, docs file, or license, mark code as changed
              if [[ ! "$file" == *.md ]] && [[ ! "$file" == docs/* ]] && [[ ! "$file" == LICENSE ]]; then
                CODE_CHANGED="true"
                break
              fi
            done
          fi
          echo "code_changed=$CODE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "Python code changed: $CODE_CHANGED"

      - name: Synchronize Resources
        run: |
          python3 scripts/sync_baseline.py
          python3 scripts/sync_colors.py

      - name: Run Quality Gate (pre-commit lints)
        env:
          # actionlint is a Go binary and does not belong in a Python-version matrix.
          # It is validated in the dedicated 'actionlint' job instead, which runs
          # the official binary directly and is unaffected by setuptools versions.
          SKIP: bump-docs-timestamps,actionlint
        run: |
          pre-commit run --all-files --hook-stage pre-commit --show-diff-on-failure

      - name: Run MyPy Type Check
        if: steps.check_code.outputs.code_changed == 'true'
        run: |
          mypy ldm_core --config-file=mypy.ini

      - name: Run Import Dependency Audit (deptry)
        if: steps.check_code.outputs.code_changed == 'true'
        run: |
          deptry .

      - name: Run Security Audit (Bandit)
        if: steps.check_code.outputs.code_changed == 'true'
        run: |
          bandit -r ldm_core/ -x ldm_core/tests/ --severity-level medium

      - name: Run PyTest Suite
        if: steps.check_code.outputs.code_changed == 'true'
        run: |
          python -m pytest ldm_core/tests/

      - name: Run Dependency Audit (pip-audit)
        if: steps.check_code.outputs.code_changed == 'true'
        run: pip-audit


  actionlint:
    name: Lint GitHub Actions workflows
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Run actionlint
        run: ./actionlint -color

  smoke-test:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')) &&
      (github.event_name != 'push' || github.ref_name != 'master' || !contains(github.event.head_commit.message, '[release]')) &&
      needs.lint-and-test.outputs.code_changed != 'false'

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Synchronize Resources
        run: |
          python3 scripts/sync_baseline.py
          python3 scripts/sync_colors.py

      - name: Install mkcert
        run: |
          # Install mkcert for SSL smoke tests
          sudo apt-get update || true
          sudo apt-get install -y libnss3-tools
          curl -Lf https://github.com/FiloSottile/mkcert/releases/download/v1.4.4/mkcert-v1.4.4-linux-amd64 -o mkcert
          chmod +x mkcert
          sudo mv mkcert /usr/local/bin/
          mkcert -install

      - name: LDM Doctor Smoke Test
        shell: bash
        run: |
          # Run doctor in non-interactive mode
          export DOCKER_API_VERSION=1.44
          pip install -e .
          # Test --skip-project and non-zero exit code (should be 0 or 1 depending on Docker state)
          # In CI, Docker might not be fully functional, so we tolerate exit 1
          python3 liferay_docker.py doctor --skip-project || [ $? -eq 1 ]

      - name: LDM Repair Smoke Test (Mock)
        shell: bash
        run: |
          pip install -e .
          # Mock a repair attempt (aborted via input or URL check)
          # We just verify it parses arguments and reaches preparation
          python3 liferay_docker.py upgrade --repair <<< "N" || true

      - name: LDM Run Smoke Test (Mock)
        shell: bash
        run: |
          # Pre-pull alpine to prevent pull timeouts during verification
          docker pull alpine || true

          # Create a mock project
          mkdir -p smoke-project/files
          touch smoke-project/files/portal-ext.properties
          # Using a modern LTS version for metadata
          {
            echo "tag=2026.q1.4-lts"
            echo "container_name=smoke-test"
            echo "db_type=postgresql"
            # Use alpine as a lightweight mock image for logic verification
            echo "image_tag=alpine"
          } > smoke-project/.liferay-docker.meta

          # Run LDM to generate compose
          pip install -e .
          python3 liferay_docker.py -y run smoke-project --no-up --sidecar --no-wait

          # Override healthcheck in generated compose to avoid timeout since we use alpine
          # Use python to safely manipulate the YAML if possible, or simple sed
          sed -i 's/curl -f http:\/\/localhost:8080\/c\/portal\/layout/true/g' smoke-project/docker-compose.yml

          # Now run without --no-up to verify it starts and exits quickly
          python3 liferay_docker.py -y run smoke-project --sidecar --no-wait

      - name: Upload Smoke Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-artifacts
          path: smoke-project/
          retention-days: 7

  build:
    needs: [lint-and-test, smoke-test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    if: |
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request') &&
      needs.lint-and-test.outputs.code_changed != 'false'

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Synchronize Resources
        run: |
          python3 scripts/sync_baseline.py
          python3 scripts/sync_colors.py

      - name: Build Standalone (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install .
          shiv -e ldm_core.cli:main -o ldm-linux -p '/usr/bin/env python3' --no-compile .
          chmod +x ldm-linux
          echo "BINARY_PATH=ldm-linux" >> "$GITHUB_ENV"

      - name: Build Standalone (macOS Multi-Arch)
        if: matrix.os == 'macos-latest'
        run: |
          # 1. Build ARM64 (Native)
          shiv -e ldm_core.cli:main -o ldm-macos-arm64 -p '/usr/bin/env python3' --no-compile .
          
          # 2. Build x86_64 (Cross-packaged)
          mkdir x86_64_site_packages
          pip install --platform macosx_11_0_x86_64 --only-binary=:all: --target x86_64_site_packages --python-version 3.13 --implementation cp -r requirements.txt
          shiv -e ldm_core.cli:main -o ldm-macos-x86_64 -p '/usr/bin/env python3' --no-deps --site-packages x86_64_site_packages --no-compile .
          
          chmod +x ldm-macos-arm64 ldm-macos-x86_64
          echo "BINARY_PATH_ARM=ldm-macos-arm64" >> "$GITHUB_ENV"
          echo "BINARY_PATH_X86=ldm-macos-x86_64" >> "$GITHUB_ENV"

      - name: Build Standalone (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          pyinstaller --onefile --name ldm-windows --add-data "ldm_core/resources;ldm_core/resources" liferay_docker.py
          echo "BINARY_PATH=dist/ldm-windows.exe" >> "$GITHUB_ENV"

      - name: Verify Compiled Binary (Smoke Test)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            # Verify arm64 binary
            ./${{ env.BINARY_PATH_ARM }} --version
            ./${{ env.BINARY_PATH_ARM }} init test-project-arm -y --no-up
            # Skip running the x86_64 binary natively on the arm64 runner to avoid Rosetta / Architecture mismatch errors.
          else
            # Verify Linux/Windows binary
            ./${{ env.BINARY_PATH }} --version
            ./${{ env.BINARY_PATH }} init test-project -y --no-up
          fi

      - name: Upload Artifacts (Linux/Windows)
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: ldm-binary-${{ matrix.os }}
          path: ${{ env.BINARY_PATH }}
          if-no-files-found: error

      - name: Upload Artifacts (macOS Multi)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: ldm-binary-macos
          path: |
            ldm-macos-arm64
            ldm-macos-x86_64
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for Release Pattern
        id: check_release
        shell: bash
        run: |
          # shellcheck disable=SC2193,SC2086
          if [[ "${{ github.ref_name }}" != *"-"* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: bin-temp
          merge-multiple: true

      - name: Prepare License
        run: |
          cp LICENSE bin-temp/

      - name: Generate Checksums
        shell: bash
        run: |
          cd bin-temp
          sha256sum ldm-linux ldm-macos-arm64 ldm-macos-x86_64 ldm-windows.exe ../compatibility.json > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            bin-temp/ldm-linux
            bin-temp/ldm-macos-arm64
            bin-temp/ldm-macos-x86_64
            bin-temp/ldm-windows.exe
            bin-temp/checksums.txt
            bin-temp/LICENSE
            compatibility.json
          make_latest: ${{ steps.check_release.outputs.is_release == 'true' }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Liferay Docker Manager (LDM) ${{ github.ref_name }}
            
            ${{ steps.check_release.outputs.is_release == 'true' && '🚀 **OFFICIAL RELEASE**' || '🧪 **PRE-RELEASE / TEST BUILD**' }}

            This version continues our commitment to environmental hardening for macOS, Windows, and Linux.

            ### 🚀 Installation (Direct Binary)

            **macOS (Apple Silicon):**
            ```bash
            sudo curl -L https://github.com/peterrichards-lr/liferay-docker-manager/releases/${{ steps.check_release.outputs.is_release == 'true' && 'latest/download' || format('download/{0}', github.ref_name) }}/ldm-macos-arm64 -o /usr/local/bin/ldm
            sudo chmod +x /usr/local/bin/ldm
            ```

            **macOS (Apple Intel):**
            ```bash
            sudo curl -L https://github.com/peterrichards-lr/liferay-docker-manager/releases/${{ steps.check_release.outputs.is_release == 'true' && 'latest/download' || format('download/{0}', github.ref_name) }}/ldm-macos-x86_64 -o /usr/local/bin/ldm
            sudo chmod +x /usr/local/bin/ldm
            ```

            **Linux / WSL2:**
            ```bash
            sudo curl -L https://github.com/peterrichards-lr/liferay-docker-manager/releases/${{ steps.check_release.outputs.is_release == 'true' && 'latest/download' || format('download/{0}', github.ref_name) }}/ldm-linux -o /usr/local/bin/ldm
            sudo chmod +x /usr/local/bin/ldm
            ```

            **Windows (PowerShell):**
            ```powershell
            New-Item -ItemType Directory -Force -Path "$HOME\bin"
            Invoke-WebRequest -Uri "https://github.com/peterrichards-lr/liferay-docker-manager/releases/${{ steps.check_release.outputs.is_release == 'true' && 'latest/download' || format('download/{0}', github.ref_name) }}/ldm-windows.exe" -OutFile "$HOME\bin\ldm.exe"
            ```
          draft: false
          prerelease: ${{ steps.check_release.outputs.is_release != 'true' }}
