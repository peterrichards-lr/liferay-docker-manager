name: LDM CI & Release

on:
  push:
    branches: ["master"]
    tags: ["v*"] # Trigger on tags like v1.0.0
  pull_request:
    branches: ["master"]
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Security Scan (Bandit)
        run: |
          # Scan for common security issues in Python code.
          # We only fail on Medium/High severity to allow necessary subprocess patterns.
          bandit -r ldm_core/ -x ldm_core/tests/ --severity-level medium

      - name: Dependency Audit (pip-audit)
        run: |
          # Ignoring CVE-2026-4539 (pygments) as it is currently unpatched and doesn't affect LDM.
          pip-audit --ignore-vuln CVE-2026-4539

      - name: Lint Shell scripts (ShellCheck)
        run: |
          sudo apt-get install -y shellcheck
          find . -name "*.sh" -not -path "*/.*" | xargs shellcheck

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: "**/*.md"

      - name: Documentation Sync
        shell: bash
        run: |
          pip install -e .
          python3 scripts/sync_docs.py
          # Fail CI if sync script made changes - this ensures docs were synced BEFORE commit
          git diff --exit-code docs/*.md

      - name: Verify Version Sync
        shell: bash
        run: |
          export LDM_DEV_MODE=true
          python3 liferay_docker.py version --check

      - name: Run unit tests
        shell: bash
        run: |
          pip install -e .
          pytest

  smoke-test:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install mkcert
        run: |
          # Install mkcert for SSL smoke tests
          sudo apt-get update
          sudo apt-get install -y libnss3-tools
          curl -L https://github.com/FiloSottile/mkcert/releases/download/v1.4.4/mkcert-v1.4.4-linux-amd64 -o mkcert
          chmod +x mkcert
          sudo mv mkcert /usr/local/bin/
          mkcert -install

      - name: LDM Doctor Smoke Test
        shell: bash
        run: |
          # Run doctor in non-interactive mode
          export DOCKER_API_VERSION=1.44
          pip install -e .
          # Test --skip-project and non-zero exit code (should be 0 or 1 depending on Docker state)
          # In CI, Docker might not be fully functional, so we tolerate exit 1
          python3 liferay_docker.py doctor --skip-project || [ $? -eq 1 ]

      - name: LDM Repair Smoke Test (Mock)
        shell: bash
        run: |
          pip install -e .
          # Mock a repair attempt (aborted via input or URL check)
          # We just verify it parses arguments and reaches preparation
          python3 liferay_docker.py upgrade --repair <<< "N" || true

      - name: LDM Run Smoke Test (Mock)
        shell: bash
        run: |
          # Create a mock project
          mkdir -p smoke-project/files
          touch smoke-project/files/portal-ext.properties
          # Using an older version format to avoid triggering global search logic in CI
          echo "tag=7.4.13-u100" > smoke-project/.liferay-docker.meta
          echo "container_name=smoke-test" >> smoke-project/.liferay-docker.meta
          echo "image_tag=alpine" >> smoke-project/.liferay-docker.meta

          # Run LDM to generate compose
          pip install -e .
          python3 liferay_docker.py -y run smoke-project --no-up --sidecar --no-wait

          # Override healthcheck in generated compose to avoid timeout since we use alpine
          # Use python to safely manipulate the YAML if possible, or simple sed
          sed -i 's/curl -f http:\/\/localhost:8080\/c\/portal\/layout/true/g' smoke-project/docker-compose.yml

          # Now run without --no-up to verify it starts and exits quickly
          python3 liferay_docker.py -y run smoke-project --no-wait
  build:
    needs: [lint-and-test, smoke-test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest] # No more macos-12/13
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build Standalone (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install .
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            export TAG_NAME=${GITHUB_REF#refs/tags/}
            export VERSION_VAL=${TAG_NAME#v}
            export LDM_DEV_MODE=true
            python3 liferay_docker.py version --set "$VERSION_VAL" --build-info "Release $TAG_NAME"
          fi
          shiv -e ldm_core.cli:main -o ldm-linux -p '/usr/bin/env python3' .
          chmod +x ldm-linux
          echo "BINARY_PATH=ldm-linux" >> $GITHUB_ENV

      - name: Build Standalone (macOS Multi-Arch)
        if: matrix.os == 'macos-latest'
        run: |
          # Inject Build Metadata
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            export TAG_NAME=${GITHUB_REF#refs/tags/}
            export VERSION_VAL=${TAG_NAME#v}
            export LDM_DEV_MODE=true
            python3 liferay_docker.py version --set "$VERSION_VAL" --build-info "Release $TAG_NAME"
          fi
          # 1. Build ARM64 (Native)

          shiv -e ldm_core.cli:main -o ldm-macos-arm64 -p '/usr/bin/env python3' .
          
          # 2. Build x86_64 (Cross-packaged)
          # We fetch the Intel wheels explicitly
          mkdir x86_64_site_packages
          pip install \
            --platform macosx_11_0_x86_64 \
            --only-binary=:all: \
            --target x86_64_site_packages \
            --python-version 3.13 \
            --implementation cp \
            -r requirements.txt
          
          # Bundle with shiv using the cross-fetched site-packages
          shiv -e ldm_core.cli:main -o ldm-macos-x86_64 -p '/usr/bin/env python3' --no-deps --site-packages x86_64_site_packages .
          
          chmod +x ldm-macos-arm64 ldm-macos-x86_64
          
          # Create a list of files for the upload step (using wildcard in next step)
          echo "BINARY_PATH_ARM=ldm-macos-arm64" >> $GITHUB_ENV
          echo "BINARY_PATH_X86=ldm-macos-x86_64" >> $GITHUB_ENV

      - name: Build Standalone (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            export TAG_NAME=${GITHUB_REF#refs/tags/}
            export VERSION_VAL=${TAG_NAME#v}
            export LDM_DEV_MODE=true
            python3 liferay_docker.py version --set "$VERSION_VAL" --build-info "Release $TAG_NAME"
          fi
          pyinstaller --onefile --name ldm-windows --add-data "ldm_core/resources;ldm_core/resources" liferay_docker.py
          echo "BINARY_PATH=dist/ldm-windows.exe" >> $GITHUB_ENV

      - name: Upload Artifacts (Linux/Windows)
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ldm-binary-${{ matrix.os }}
          path: ${{ env.BINARY_PATH }}
          if-no-files-found: error

      - name: Upload Artifacts (macOS Multi)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ldm-binary-macos
          path: |
            ldm-macos-arm64
            ldm-macos-x86_64
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # Needed for creating releases

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for commit message checks

      - name: Check for Release Keyword
        id: check_release
        shell: bash
        run: |
          # Detect logic:
          # 1. If tag has a hyphen (e.g. v2.4.25-beta) -> Pre-release
          # 2. If commit has [beta] or [pre-release] -> Pre-release
          # 3. If commit has [release] AND tag has NO hyphen -> Full Release
          
          MSG=$(git log -1 --pretty=%B)
          TAG_NAME=${GITHUB_REF_NAME}
          
          if [[ "$TAG_NAME" == *-* ]] || echo "$MSG" | grep -qiE "\[beta\]|\[pre-release\]"; then
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Pre-release detected (Tag: $TAG_NAME, Msg: $MSG)"
          elif echo "$MSG" | grep -qi "\[release\]"; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "Full release detected."
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Defaulting to pre-release for safety."
          fi

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin-temp
          merge-multiple: true

      - name: Prepare Samples and License
        run: |
          (cd references && zip -r ../samples.zip samples/)
          cp LICENSE bin-temp/
          mv samples.zip bin-temp/

      - name: Generate Checksums
        shell: bash
        run: |
          cd bin-temp
          # Create ldm-macos alias (pointing to arm64 for now)
          cp ldm-macos-arm64 ldm-macos
          sha256sum ldm-linux ldm-macos ldm-macos-arm64 ldm-macos-x86_64 ldm-windows.exe samples.zip ../compatibility.json > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin-temp/ldm-linux
            bin-temp/ldm-macos
            bin-temp/ldm-macos-arm64
            bin-temp/ldm-macos-x86_64
            bin-temp/ldm-windows.exe
            bin-temp/samples.zip
            bin-temp/checksums.txt
            bin-temp/LICENSE
            compatibility.json
          make_latest: ${{ steps.check_release.outputs.is_release == 'true' }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Liferay Docker Manager (LDM) ${{ github.ref_name }}

            ${{ steps.check_release.outputs.is_release == 'true' && '🚀 **OFFICIAL RELEASE**' || '🧪 **PRE-RELEASE / TEST BUILD**' }}

            This version continues our commitment to environmental hardening for macOS, Windows, and Linux.

            ### 🚀 Installation (Direct Binary)

            **macOS (Apple Silicon):**
            ```bash
            sudo curl -L https://github.com/peterrichards-lr/liferay-docker-manager/releases/${{ steps.check_release.outputs.is_release == 'true' && 'latest/download' || format('download/{0}', github.ref_name) }}/ldm-macos-arm64 -o /usr/local/bin/ldm
            sudo chmod +x /usr/local/bin/ldm
            ```

            **macOS (Apple Intel):**
            ```bash
            sudo curl -L https://github.com/peterrichards-lr/liferay-docker-manager/releases/${{ steps.check_release.outputs.is_release == 'true' && 'latest/download' || format('download/{0}', github.ref_name) }}/ldm-macos-x86_64 -o /usr/local/bin/ldm
            sudo chmod +x /usr/local/bin/ldm
            ```

            **Linux / WSL2:**
            ```bash
            sudo curl -L https://github.com/peterrichards-lr/liferay-docker-manager/releases/${{ steps.check_release.outputs.is_release == 'true' && 'latest/download' || format('download/{0}', github.ref_name) }}/ldm-linux -o /usr/local/bin/ldm
            sudo chmod +x /usr/local/bin/ldm
            ```

            **Windows (PowerShell):**
            ```powershell
            New-Item -ItemType Directory -Force -Path "$HOME\bin"
            Invoke-WebRequest -Uri "https://github.com/peterrichards-lr/liferay-docker-manager/releases/${{ steps.check_release.outputs.is_release == 'true' && 'latest/download' || format('download/{0}', github.ref_name) }}/ldm-windows.exe" -OutFile "$HOME\bin\ldm.exe"
            ```

            ### 🛠 Standard Hardening Features
            - **Hardened Monitoring**: Native Polling on macOS to prevent descriptor crashes.
            - **Wildcard SSL**: Automatic generation and Traefik matching for `*.local` and custom domains.
            - **Self-Healing Baseline**: Restore developer defaults via `ldm init-common`.
            - **Infrastructure Management**: Control global proxy state via `ldm infra-setup`.
            - **Architecture-Aware**: Automatic detection of OS for updates and checksums.
          draft: false
          prerelease: ${{ steps.check_release.outputs.is_release != 'true' }}
