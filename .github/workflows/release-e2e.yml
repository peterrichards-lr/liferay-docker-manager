name: LDM Release E2E

on:
  push:
    tags: ["v*"] # Only run when a tag is pushed
  workflow_dispatch: # Allow manual trigger for ad-hoc verification

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-verification:
    # Only run if the commit message explicitly includes [release]
    if: contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e . # Ensure local package is prioritized

      - name: Run Live Docker E2E Suite
        shell: bash
        run: |
          # The script verifies global infra, project labels, status, and disambiguation
          bash scripts/verify_e2e_refactor.sh
