name: LDM Release E2E

on:
  push:
    tags: ["v*"] # Only run when a tag is pushed
  workflow_dispatch: # Allow manual trigger for ad-hoc verification

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-verification:
    # Run if the commit message includes [release], [beta], [pre-release]
    # OR if the tag name indicates a pre-release (contains a hyphen)
    if: |
      contains(github.event.head_commit.message, '[release]') ||
      contains(github.event.head_commit.message, '[beta]') ||
      contains(github.event.head_commit.message, '[pre-release]') ||
      contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e . # Ensure local package is prioritized

      - name: Run Live Docker E2E Suite
        shell: bash
        run: |
          # The script verifies global infra, project labels, status, and disambiguation
          bash scripts/verify_e2e_refactor.sh
