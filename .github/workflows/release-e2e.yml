name: LDM Release E2E

on:
  push:
    tags: ["v*"] # Only run when a tag is pushed
  workflow_dispatch: # Allow manual trigger for ad-hoc verification

# LDM-385: Prevent simultaneous runs for the entire workflow
# This groups all tag pushes into a single queue, cancelling older runs
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Skip check if not a tag push
        id: check_trigger
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Code
        if: steps.check_trigger.outputs.is_tag == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate Tag and Branch Alignment
        if: steps.check_trigger.outputs.is_tag == 'true'
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == *"-"* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          
          git fetch origin master
          if git branch -r --contains ${{ github.sha }} | grep -E 'origin/master$' >/dev/null; then
            ON_MASTER=true
          else
            ON_MASTER=false
          fi
          
          echo "Tag: $TAG_NAME"
          echo "Is Pre-release: $IS_PRERELEASE"
          echo "Is on master: $ON_MASTER"
          
          if [ "$IS_PRERELEASE" = "true" ] && [ "$ON_MASTER" = "true" ]; then
            echo "::error::Pre-release tags (containing '-') cannot be pushed on master branch!"
            exit 1
          elif [ "$IS_PRERELEASE" = "false" ] && [ "$ON_MASTER" = "false" ]; then
            echo "::error::Stable release tags (no '-') must only be pushed on master branch!"
            exit 1
          fi
          echo "Tag validation successful!"

  e2e-verification:
    needs: validate-tag
    # Run on all version tags (v2.5.0, v2.5.0-pre.1, etc.)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    steps:
      - name: Wait for commit batching (15m debounce)
        # This allows multiple pushes in a 15-min window to be 'grouped'
        # into a single run, as the previous runs will be cancelled by concurrency.
        # Note: We skip this for manual 'workflow_dispatch' triggers.
        if: github.event_name == 'push'
        run: sleep 900

      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e . # Ensure local package is prioritized

      - name: Synchronize Resources
        run: |
          python3 scripts/sync_baseline.py
          python3 scripts/sync_colors.py

      - name: Install Playwright Browsers
        run: |
          playwright install chromium --with-deps

      - name: Run Live Docker E2E Suite
        shell: bash
        run: |
          # The script verifies global infra, project labels, status, and disambiguation
          bash scripts/verify_e2e_refactor.sh

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-and-verification-results
          path: |
            test-results/
            verify-*.txt
          retention-days: 7
