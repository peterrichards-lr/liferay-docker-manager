name: LDM Platform Verification (Multi-OS)

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2 AM UTC
  push:
    tags: ["v*"] # Run on every release

# LDM-385: Prevent simultaneous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-linux:
    name: Verify Linux (${{ matrix.distro }})
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, fedora]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run E2E Verification Suite (Ubuntu)
        if: matrix.distro == 'ubuntu'
        env:
          GITHUB_ACTIONS: "true"
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip git docker-compose python3-venv hostname
          pip install . --break-system-packages
          bash scripts/verify_e2e_refactor.sh --ci
          
      - name: Run E2E Verification Suite (Fedora)
        if: matrix.distro == 'fedora'
        run: |
          docker run --rm --privileged \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            -e GITHUB_ACTIONS="true" \
            fedora:latest \
            bash -c "dnf install -y python3-pip git docker-compose hostname which && pip install . --break-system-packages && bash scripts/verify_e2e_refactor.sh --ci"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-results-${{ matrix.distro }}
          path: verify-*.txt
          retention-days: 7

  verify-macos:
    name: Verify macOS (${{ matrix.macos }})
    strategy:
      fail-fast: false
      matrix:
        macos: [macos-13, macos-14]
    runs-on: ${{ matrix.macos }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install System Dependencies (Colima)
        run: |
          brew update
          brew install colima docker docker-compose python
          # Start Colima with 2 CPUs and 6GB RAM (GitHub runners have 7GB)
          colima start --cpu 2 --memory 6

      - name: Install LDM
        run: pip install . --break-system-packages

      - name: Run E2E Verification Suite
        env:
          GITHUB_ACTIONS: "true"
        run: bash scripts/verify_e2e_refactor.sh --ci
        
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-results-${{ matrix.macos }}
          path: verify-*.txt
          retention-days: 7

  verify-windows:
    name: Verify Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Setup Docker (Linux Mode)
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "buildkit": true
              }
            }

      - name: Install LDM
        run: pip install .

      - name: Run E2E Verification Suite (PowerShell)
        env:
          GITHUB_ACTIONS: "true"
        run: .\scripts\verify_e2e_refactor.ps1 -CI
        
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-results-windows
          path: verify-*.txt
          retention-days: 7
