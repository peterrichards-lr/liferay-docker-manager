name: LDM Platform Verification (Multi-OS)

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2 AM UTC
  push:
    tags: ["v*"] # Run on every release

# LDM-385: Prevent simultaneous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-linux:
    name: Verify Linux (${{ matrix.distro }})
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, fedora]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run E2E Verification Suite (Ubuntu)
        if: matrix.distro == 'ubuntu'
        env:
          GITHUB_ACTIONS: "true"
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip git docker-compose python3-venv hostname
          python3 -m venv .venv
          source .venv/bin/activate
          pip install .
          bash scripts/verify_e2e_refactor.sh --ci
          
      - name: Run E2E Verification Suite (Fedora)
        if: matrix.distro == 'fedora'
        run: |
          docker run --rm --privileged \
            --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e GITHUB_ACTIONS="true" \
            fedora:latest \
            bash -c "dnf install -y python3-pip git docker-compose hostname which && python3 -m venv .venv && source .venv/bin/activate && pip install . && bash scripts/verify_e2e_refactor.sh --ci"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verification-results-${{ matrix.distro }}
          path: verify-*.txt
          retention-days: 7
