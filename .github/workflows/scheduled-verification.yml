name: LDM Platform Verification (Multi-OS)

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2 AM UTC
  push:
    tags: ["v*"] # Run on every release

# LDM-385: Prevent simultaneous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default: read-only. The sync-compatibility job overrides this with write access.
permissions:
  contents: read

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Skip check if not a tag push
        id: check_trigger
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Code
        if: steps.check_trigger.outputs.is_tag == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate Tag and Branch Alignment
        if: steps.check_trigger.outputs.is_tag == 'true'
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == *"-"* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          
          git fetch origin master
          if git branch -r --contains ${{ github.sha }} | grep -E 'origin/master$' >/dev/null; then
            ON_MASTER=true
          else
            ON_MASTER=false
          fi
          
          echo "Tag: $TAG_NAME"
          echo "Is Pre-release: $IS_PRERELEASE"
          echo "Is on master: $ON_MASTER"
          
          if [ "$IS_PRERELEASE" = "true" ] && [ "$ON_MASTER" = "true" ]; then
            echo "::error::Pre-release tags (containing '-') cannot be pushed on master branch!"
            exit 1
          elif [ "$IS_PRERELEASE" = "false" ] && [ "$ON_MASTER" = "false" ]; then
            echo "::error::Stable release tags (no '-') must only be pushed on master branch!"
            exit 1
          fi
          echo "Tag validation successful!"

  verify-linux:
    needs: validate-tag
    name: Verify Linux (${{ matrix.distro }})
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, fedora]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run E2E Verification Suite (Ubuntu)
        if: matrix.distro == 'ubuntu'
        env:
          GITHUB_ACTIONS: "true"
        run: |
          sudo apt-get update || true
          sudo apt-get install -y python3-pip git docker-compose python3-venv hostname
          python3 -m venv .venv
          source .venv/bin/activate
          pip install .
          bash scripts/verify_e2e_refactor.sh --ci
          
      - name: Run E2E Verification Suite (Fedora)
        if: matrix.distro == 'fedora'
        run: |
          docker run --rm --privileged \
            --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e GITHUB_ACTIONS="true" \
            fedora:latest \
            bash -c "dnf install -y python3-pip git docker-compose hostname which && python3 -m venv .venv && source .venv/bin/activate && pip install . && bash scripts/verify_e2e_refactor.sh --ci"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verification-results-${{ matrix.distro }}
          path: verify-*.txt
          retention-days: 7

  sync-compatibility:
    name: Sync Compatibility Table
    needs: [verify-linux]
    runs-on: ubuntu-latest
    # Only sync on release tag pushes — not on nightly cron or manual dispatch
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v7
        with:
          ref: master
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --disable-pip-version-check -r requirements.txt
          pip install --disable-pip-version-check -e .

      - name: Download Ubuntu verification report
        uses: actions/download-artifact@v8
        with:
          name: verification-results-ubuntu
          path: ci-reports/
        continue-on-error: true

      - name: Download Fedora verification report
        uses: actions/download-artifact@v8
        with:
          name: verification-results-fedora
          path: ci-reports/
        continue-on-error: true

      - name: Sync CI reports into repository
        run: |
          # Remove stale CI-managed Linux reports before replacing with fresh ones.
          # Manual reports (macOS/Windows) are intentionally never touched here.
          rm -f references/verification-results/verify-linux-workstation-ubuntu-*.txt
          rm -f references/verification-results/verify-linux-workstation-fedora-*.txt
          # Copy only passing reports from this CI run
          find ci-reports/ -name "verify-*-pass-*.txt" -exec cp {} references/verification-results/ \; 2>/dev/null || true
          echo "Reports now in references/verification-results/:"
          ls -1 references/verification-results/verify-*.txt 2>/dev/null || echo "  (none found)"

      - name: Regenerate compatibility table
        run: python3 scripts/sync_compatibility.py

      - name: Stage changes
        id: changes
        run: |
          git add references/verification-results/ docs/COMPATIBILITY_TABLE.md
          # Stage README.md only if it exists (it may not be present on all branches)
          if [ -f README.md ]; then
            git add README.md
          fi
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected — compatibility table is already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected — will open a pull request."
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          LDM_VERSION=$(python3 scripts/get_version.py)
          BRANCH="docs/compat-sync-ci-${LDM_VERSION}-$(date +%Y%m%d-%H%M%S)"
          PR_BODY="Automatically generated by the **LDM Platform Verification (Multi-OS)** workflow after release \`v${LDM_VERSION}\`."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -m "docs: sync compatibility table from CI verification (v${LDM_VERSION})"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: Sync Compatibility Table from CI (v${LDM_VERSION})" \
            --body "$PR_BODY" \
            --base master \
            --head "$BRANCH"
