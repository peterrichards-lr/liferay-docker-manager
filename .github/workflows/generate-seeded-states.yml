name: Generate Seeded States

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  get-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.set-tags.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - id: set-tags
        run: |
          TAGS=$(python3 scripts/get_release_tags.py)
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-seeds:
    needs: get-tags
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ${{ fromJson(needs.get-tags.outputs.tags) }}
        db_type: [postgresql, mysql, hypersonic]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install LDM
        run: pip install -e .

      - name: Initialize Common Assets
        run: ldm init-common

      - name: Start Liferay
        run: |
          # Construct a safe project name (dots -> underscores) for the filesystem
          SAFE_TAG=$(echo "${{ matrix.tag }}" | tr '.' '_')
          PROJECT_ID="seeded-${SAFE_TAG}-${{ matrix.db_type }}"

          # Use a dedicated project name. Q1 versions prioritize Shared Search in LDM.
          ldm -y run "$PROJECT_ID" --tag ${{ matrix.tag }} --db ${{ matrix.db_type }} --no-wait
          
      - name: Wait for Liferay Health
        run: |
          SAFE_TAG=$(echo "${{ matrix.tag }}" | tr '.' '_')
          PROJECT_ID="seeded-${SAFE_TAG}-${{ matrix.db_type }}"
          echo "Waiting for Liferay to be healthy (this can take 5-10 minutes)..."
          MAX_RETRIES=60
          COUNT=0
          until [ "$(docker inspect -f '{{.State.Health.Status}}' $PROJECT_ID)" == "healthy" ]; do
            if [ $COUNT -ge $MAX_RETRIES ]; then
              echo "Timeout waiting for Liferay"
              docker logs $PROJECT_ID --tail 100
              exit 1
            fi
            printf "."
            sleep 10
            COUNT=$((COUNT+1))
          done
          echo "Liferay is healthy!"

      - name: Capture Snapshot
        run: |
          SAFE_TAG=$(echo "${{ matrix.tag }}" | tr '.' '_')
          PROJECT_ID="seeded-${SAFE_TAG}-${{ matrix.db_type }}"
          # Create marker file to allow root execution (bypasses sudo env scrubbing)
          touch .ldm_allow_root
          sudo $(which python3) liferay_docker.py snapshot "$PROJECT_ID" --name "Seed: ${{ matrix.tag }} (${{ matrix.db_type }})"
          rm .ldm_allow_root
          
      - name: Package Seeded State
        id: package
        run: |
          SAFE_TAG=$(echo "${{ matrix.tag }}" | tr '.' '_')
          PROJECT_ID="seeded-${SAFE_TAG}-${{ matrix.db_type }}"
          
          # Reclaim ownership from root (since snapshot was run via sudo)
          sudo chown -R $USER:$USER $PROJECT_ID
          
          # Determine search mode
          SEARCH_MODE="shared"
          if [[ "${{ matrix.tag }}" < "2025.q1" ]]; then
             SEARCH_MODE="sidecar"
          fi

          # Get Seed Logic Version from constants
          SEED_VER=$(python3 -c "from ldm_core.constants import SEED_VERSION; print(SEED_VERSION)")

          SNAP_DIR=$(ls -td $PROJECT_ID/snapshots/*/ | head -1)
          cd "$SNAP_DIR"
          FILENAME="seeded-${{ matrix.tag }}-${{ matrix.db_type }}-${SEARCH_MODE}-v${SEED_VER}.tar.gz"
          mv files.tar.gz "$FILENAME"
          echo "path=$SNAP_DIR$FILENAME" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Upload Workspace Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.filename }}
          path: ${{ steps.package.outputs.path }}
          retention-days: 1

  publish-release:
    needs: generate-seeds
    if: success()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.7
        with:
          path: all-seeds
          pattern: seeded-*

      - name: Get LDM Version
        id: ldm_version
        run: |
          VERSION=$(python3 -c "from ldm_core.constants import VERSION; print(VERSION)")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: seeded-states
          files: all-seeds/**/*
          prerelease: false
          draft: false
          make_latest: false
          generate_release_notes: false
          body: "Last updated on ${{ github.event.repository.updated_at }}. These seeds are maintained for the latest 4 Quarters and 2 LTS lines."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
