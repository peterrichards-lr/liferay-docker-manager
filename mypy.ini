[mypy]
python_version = 3.10
ignore_missing_imports = True
check_untyped_defs = True
warn_return_any = False
warn_unused_configs = True
explicit_package_bases = True

[mypy-ldm_core.handlers.workspace]
ignore_errors = True

[mypy-ldm_core.handlers.runtime]
ignore_errors = True

[mypy-ldm_core.tests.test_workspace]
ignore_errors = True
